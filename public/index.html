<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect to the default locale
      const path = window.location.pathname;
      if (!path.includes('/zh') && !path.includes('/en')) {
        window.location.href = path + 'zh/';
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
