services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hanly
      POSTGRES_USER: hanly
      POSTGRES_PASSWORD: hanly_dev_password
    ports:
      - "5432:5432"
    volumes:
      - hanly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanly -d hanly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hanly_postgres_data:
